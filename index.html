  if (view==='board')      renderBoard();
  if (view==='calendar')   { renderCalFilter(); renderCalendar(); }
  if (view==='archive')    { renderArcFilter(); renderArchive(); }
  if (view==='allboards')  renderAllBoards();
}

// ══════════════════════════════════════
//  MODAL HELPERS
// ══════════════════════════════════════
function mkModal(inner) {
  const d=document.createElement('div');
  d.className='modal-bd';
  d.setAttribute('role','dialog');
  d.setAttribute('aria-modal','true');
  d.innerHTML=inner;
  d.onclick=e=>{ if(e.target===d) closeModals(); };
  // Activate focus trap once modal is rendered
  setTimeout(()=>trapFocus(d.querySelector('.modal')), 0);
  return d;
}
function closeModals() {
  const wasSettings = !!document.querySelector('#modals .settings-modal');
  // If user cancels settings (with pending bg image, colour change, or blur slider tweaks)
  // restore the saved background.
  if (wasSettings || _pendingBgData !== null) {
    _pendingBgData = null;
    applyBg();
  }
  document.getElementById('modals').innerHTML='';
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModals(); });

function confirmModal(msg, onConfirm, opts) {
  closeModals();
  opts = opts || {};
  const okLabel = opts.okLabel || 'Delete';
  const destructive = opts.destructive !== false; // default true
  const okStyle = destructive
    ? 'background:rgba(200,60,60,0.2);color:#e05555;border:1px solid #5a1a1a;'
    : 'background:var(--accent);color:#fff;';
  // Build modal via DOM (not innerHTML) so msg can never inject script.
  const bd = document.createElement('div');
  bd.className = 'modal-bd';
  bd.setAttribute('role','dialog');
  bd.setAttribute('aria-modal','true');
  const md = document.createElement('div');
  md.className = 'modal';
  md.style.cssText = 'max-width:340px;text-align:center;';
  md.onclick = e=>e.stopPropagation();
  const icon = document.createElement('div');
  icon.style.cssText = 'font-size:22px;margin-bottom:10px;';
  icon.innerHTML = '&#x26A0;';
  const title = document.createElement('div');
  title.className = 'modal-title';
  title.style.cssText = 'font-size:14px;margin-bottom:6px;';
  title.textContent = msg;            // <-- safe: textContent
  const actions = document.createElement('div');
  actions.className = 'modal-actions';
  actions.style.cssText = 'justify-content:center;margin-top:16px;';
  const cancel = document.createElement('button');
  cancel.className = 'btn btn-ghost';
  cancel.textContent = 'Cancel';
  cancel.id = 'confirm-cancel-btn';
  const ok = document.createElement('button');
  ok.className = 'btn';
  ok.setAttribute('style', okStyle);
  ok.textContent = okLabel;
  ok.id = 'confirm-ok-btn';
  actions.appendChild(cancel); actions.appendChild(ok);
  md.appendChild(icon); md.appendChild(title); md.appendChild(actions);
  bd.appendChild(md);
  bd.onclick = e=>{ if(e.target===bd) closeModals(); };
  document.getElementById('modals').appendChild(bd);
  cancel.addEventListener('click', closeModals);
  ok.addEventListener('click', ()=>{ closeModals(); onConfirm(); });
  trapFocus(md);
  setTimeout(()=>ok.focus(), 30);
}

// ══════════════════════════════════════
//  BACKGROUND
// ══════════════════════════════════════
function openInlineColor(inputId, btnId) {
  document.querySelector('.inline-color-picker')?.remove();
  const btn=document.getElementById(btnId); if(!btn) return;
  const rect=btn.getBoundingClientRect();
  const cur=document.getElementById(inputId)?.value||'#ffffff';
  const swatches=PASTELS.map(c=>
    `<div class="pastel-swatch${cur===c?' sel':''}" style="background:${c}" title="${c}"
      onclick="setInlineColor('${inputId}','${btnId}','${c}')"></div>`
  ).join('');
  const picker=document.createElement('div');
  picker.className='inline-color-picker';
  // Position below button, flip up if too close to bottom
  const spaceBelow=window.innerHeight-rect.bottom;
  picker.style.left=Math.min(rect.left, window.innerWidth-230)+'px';
  picker.style.top=(spaceBelow>260?rect.bottom+4:rect.top-260-4)+'px';
  picker.innerHTML=`<div class="pastel-grid">${swatches}</div>
    <input type="color" value="${cur}"
      style="width:100%;height:28px;border-radius:4px;border:1px solid var(--border);background:var(--surface3);cursor:pointer;"
      oninput="setInlineColor('${inputId}','${btnId}',this.value,false)">`;
  document.body.appendChild(picker);
  setTimeout(()=>{
    function outside(e){ if(!picker.contains(e.target)&&e.target.id!==btnId){picker.remove();document.removeEventListener('pointerdown',outside);} }
    document.addEventListener('pointerdown',outside);
  },10);
}
function setInlineColor(inputId, btnId, color, close=true) {
  const inp=document.getElementById(inputId), btn=document.getElementById(btnId);
  if(inp) inp.value=color;
  if(btn) btn.style.background=color;
  document.querySelector('.inline-color-picker')?.querySelectorAll('.pastel-swatch').forEach(s=>s.classList.toggle('sel',s.title===color));
  if(close) document.querySelector('.inline-color-picker')?.remove();
}

function setBoardBgColor(col) {
  const inp=document.getElementById('bg-color');
  if(inp) inp.value=col;
  document.querySelectorAll('.pastel-swatch').forEach(sw=>sw.classList.toggle('sel',sw.title===col));
  previewBgColor(col);
}
function previewBgColor(col) {
  const bl=document.getElementById('bg-layer');
  bl.style.backgroundImage=''; bl.style.filter=''; bl.style.transform='';
  bl.style.backgroundColor=col;
}
function clearBgColor() {
  const inp=document.getElementById('bg-color'); if(inp) inp.value='#0c0c0f';
  previewBgColor('#0c0c0f');
}
function applyBg() {
  const g=activeGroup(), bl=document.getElementById('bg-layer');
  const img=g?.settings.bgImage||'', col=g?.settings.bgColor||'';
  if (img) {
    bl.style.backgroundImage=`url(${img})`; bl.style.filter=`blur(${g.settings.bgBlur||0}px)`;
    bl.style.transform='scale(1.06)'; bl.style.backgroundColor='';
  } else if (col) {
    bl.style.backgroundImage=''; bl.style.filter=''; bl.style.transform=''; bl.style.backgroundColor=col;
  } else {
    bl.style.backgroundImage=''; bl.style.filter=''; bl.style.transform=''; bl.style.backgroundColor='';
  }
}

// ══════════════════════════════════════
//  INIT
// ══════════════════════════════════════
load();
if (!activeGroupId) activeGroupId=S.groups[0]?.id||null;
renderGroupTabs();
renderBoard();
applyBg();

_lastTodayISO = todayISO();
setInterval(()=>{
  // Skip re-render while user is dragging — otherwise the in-flight drag is destroyed.
  if (pd.active || dragId) return;
  const now = todayISO();
  if (now === _lastTodayISO) return; // date hasn't ticked over, "today" highlight still accurate
  _lastTodayISO = now;
  const active=document.querySelector('.view-content.active');
  if(active?.id==='board-view')    renderBoard();
  if(active?.id==='calendar-view') renderCalendar();
  if(active?.id==='archive-view')  renderArchive();
},60000);

// ══════════════════════════════════════
//  TOUCH DRAG (mobile)
// ══════════════════════════════════════
const td = { id:null, ghost:null, ox:0, oy:0, moved:false };

document.addEventListener('touchstart',e=>{
  const card=e.target.closest('.task-card,.cal-task');
  if(!card||e.target.closest('button')) return;
  const taskId = card.classList.contains('cal-task')
    ? card.getAttribute('data-tid')
    : card.id.replace('tc-','');
  if(!taskId) return;
  const touch=e.touches[0], rect=card.getBoundingClientRect();
  td.id=taskId; td.ox=touch.clientX-rect.left; td.oy=touch.clientY-rect.top; td.moved=false;
  td._timer=setTimeout(()=>{
    if(!td.id) return;
    td.ghost=card.cloneNode(true);
    td.ghost.removeAttribute('id'); td.ghost.removeAttribute('draggable');
    Object.assign(td.ghost.style,{
      position:'fixed',zIndex:'9999',pointerEvents:'none',opacity:'0.88',
      width:rect.width+'px',left:(touch.clientX-td.ox)+'px',top:(touch.clientY-td.oy)+'px',
      transform:'scale(1.03) rotate(1deg)',boxShadow:'0 12px 40px rgba(0,0,0,0.7)',transition:'transform 0.1s'
    });
    document.body.appendChild(td.ghost);
    card.style.opacity='0.25'; td.moved=true;
  },180);
},{passive:true});

document.addEventListener('touchmove',e=>{
  if(!td.id||!td.ghost) return;
  e.preventDefault();
  const touch=e.touches[0];
  td.ghost.style.left=(touch.clientX-td.ox)+'px'; td.ghost.style.top=(touch.clientY-td.oy)+'px';
  document.querySelectorAll('.panel-body.dov,.cal-cell.dov').forEach(el=>el.classList.remove('dov'));
  const under=document.elementsFromPoint(touch.clientX,touch.clientY);
  const pb=under.find(el=>el.classList.contains('panel-body'));
  if(pb) pb.classList.add('dov');
  const cc=under.find(el=>el.classList.contains('cal-cell')&&el.dataset.date);
  if(cc) cc.classList.add('dov');
},{passive:false});

document.addEventListener('touchend',e=>{
  clearTimeout(td._timer);
  if(!td.id) return;
  const taskId=td.id; td.id=null;
  if(td.ghost){td.ghost.remove();td.ghost=null;}
  const orig=document.getElementById(`tc-${taskId}`);
  if(orig) orig.style.opacity='';
  document.querySelectorAll('.dov').forEach(el=>el.classList.remove('dov'));
  if(!td.moved) return;
  const touch=e.changedTouches[0];
  const under=document.elementsFromPoint(touch.clientX,touch.clientY);
  const pb=under.find(el=>el.classList.contains('panel-body'));
  if(pb){
    const pid=pb.id.replace('pbody-',''), t=task(taskId);
    if(t&&t.panelId!==pid){t.panelId=pid;save();renderBoard();renderCalendar();}
    return;
  }
  const cc=under.find(el=>el.classList.contains('cal-cell')&&el.dataset.date);
  if(cc){
    const t=task(taskId); if(!t) return;
    const iso=cc.dataset.date;
    if(t.startDate){
      if(t.dueDate){
        const dur=daysBetween(t.startDate,t.dueDate);
        t.startDate=iso;
        t.dueDate=addDaysToISO(iso,dur);
      } else {
        t.startDate=iso;
      }
    } else {
      t.dueDate=iso;
    }
    save(); renderCalendar(); renderBoard();
  }
});
</script>
