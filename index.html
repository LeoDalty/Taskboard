<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taskboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c0f;
  --surface: #141418;
  --surface2: #1c1c22;
  --surface3: #24242c;
  --border: #2a2a34;
  --border2: #343442;
  --text: #e4e4ee;
  --text-muted: #60607a;
  --text-dim: #9090aa;
  --accent: #5b8fff;
  --radius: 8px;
  --radius-lg: 12px;
  /* chrome heights — kept here so calc()s stay in sync */
  --header-h: 52px;
  --tabs-bar-h: 36px;
  --chrome-h: 88px;            /* header + tabs */
  --board-vert-reserve: 140px; /* vertical-layout panel max-height padding */
  --mobile-header-h: 48px;
  --mobile-chrome-h: 84px;
  --mobile-vert-reserve: 120px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
#bg-layer { position: fixed; inset: 0; z-index: -1; background-size: cover; background-position: center; transition: filter 0.3s; }

/* ══ TOP NAV ══ */
header {
  display: flex; align-items: center;
  padding: 0 16px; height: var(--header-h);
  background: rgba(12,12,15,0.92); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 200; gap: 12px;
}
.logo { font-size: 14px; font-weight: 800; letter-spacing: 3px; color: var(--text); font-family: 'IBM Plex Mono', monospace; white-space: nowrap; flex-shrink: 0; }
.view-tabs { display: flex; gap: 2px; flex-shrink: 0; }
.view-tab-btn { padding: 5px 13px; border-radius: 6px; border: none; background: transparent; color: var(--text-muted); font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.view-tab-btn.active { background: var(--surface2); color: var(--text); }
.view-tab-btn:hover:not(.active) { color: var(--text-dim); }
.nav-sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }
.group-tabs-wrap { flex: 1; display: flex; align-items: center; gap: 4px; overflow-x: auto; min-width: 0; }
.group-tabs-wrap::-webkit-scrollbar { height: 0; }
.group-tab-btn { padding: 4px 12px; border-radius: 6px; border: 1px solid transparent; background: transparent; color: var(--text-muted); font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
.group-tab-btn.active { background: var(--surface2); color: var(--text); border-color: var(--border); }
.group-tab-btn:hover:not(.active) { color: var(--text-dim); }
.hdr-btn { width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all 0.15s; flex-shrink: 0; }
.hdr-btn:hover { color: var(--text); border-color: var(--border2); }

/* ══ SAVE/LOAD BUTTONS ══ */
.hdr-io-btn {
  height: 32px; padding: 0 11px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text-muted); cursor: pointer;
  display: flex; align-items: center; gap: 5px;
  font-family: 'IBM Plex Mono', monospace; font-size: 10px;
  font-weight: 600; letter-spacing: 0.3px;
  transition: all 0.15s; flex-shrink: 0; white-space: nowrap;
}
.hdr-io-btn:hover { color: var(--text); border-color: var(--border2); }
.hdr-io-btn.save:hover { color: #50c878; border-color: rgba(80,200,120,0.4); }
.hdr-io-btn.load:hover { color: var(--accent); border-color: rgba(91,143,255,0.4); }
.hdr-io-btn svg { flex-shrink: 0; }

/* ══ TOAST ══ */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--surface3); border: 1px solid var(--border2);
  color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 11px;
  padding: 9px 18px; border-radius: 8px; z-index: 9999;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  transition: transform 0.25s cubic-bezier(.2,.8,.4,1), opacity 0.25s;
  opacity: 0; pointer-events: none;
  display: flex; align-items: center; gap: 10px; white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; pointer-events: auto; }

/* ══ VIEWS ══ */
.view-content { display: none; }
.view-content.active { display: block; }

.board-tabs-bar { display: flex; align-items: center; padding: 0 12px; height: var(--tabs-bar-h); background: rgba(12,12,15,0.88); border-bottom: 1px solid var(--border); position: sticky; top: var(--header-h); z-index: 190; backdrop-filter: blur(12px); }

/* Board view height accounts for header + board-tabs-bar */
#board-view.view-content.active { display: flex; flex-direction: column; height: calc(100vh - var(--chrome-h)); overflow: hidden; }
#board-wrap { flex: 1; min-height: 0; display: flex; flex-direction: column; padding: 10px 20px 0; overflow: hidden; }

/* ══ BOARD ══ */
.add-panel-btn { display: inline-flex; align-items: center; gap: 8px; padding: 8px 18px; border-radius: var(--radius); border: none; background: var(--accent); color: #fff; font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.5px; cursor: pointer; margin-bottom: 12px; transition: all 0.15s; flex-shrink: 0; }
.add-panel-btn:hover { opacity: 0.85; }

/* Horizontal layout: panels stack vertically, scroll within board-wrap */
#panel-container.board-horizontal { flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden; padding-bottom: 20px; }
#panel-container.board-horizontal .panel { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); margin-bottom: 14px; overflow: hidden; min-width: 260px; transition: opacity 0.2s, border-color 0.2s; }
#panel-container.board-horizontal .task-card { width: auto; max-width: 280px; }
#panel-container.board-horizontal .task-title { display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
#panel-container.board-horizontal .panel-body { padding: 12px; display: grid; grid-template-columns: repeat(auto-fill, minmax(186px, 1fr)); gap: 10px; min-height: 76px; transition: background 0.15s; }

/* Vertical layout: columns fill height, scrollbar at bottom of viewport */
#panel-container.board-vertical { flex: 1; min-height: 0; display: flex; flex-direction: row; align-items: flex-start; gap: 14px; overflow-x: auto; overflow-y: hidden; }
#panel-container.board-vertical .panel { flex-shrink: 0; background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; max-height: calc(100% - 20px); transition: opacity 0.2s, border-color 0.2s; }
#panel-container.board-vertical .panel-body { padding: 10px 10px 0; display: flex; flex-direction: column; flex-wrap: nowrap; gap: 8px; overflow-y: auto; overflow-x: hidden; flex: 1; min-height: 0; transition: background 0.15s; }
#panel-container.board-vertical .panel-footer { height: 10px; flex-shrink: 0; background: var(--surface); }
#panel-container.board-vertical .panel-header { padding: 8px 10px; gap: 5px 6px; }
#panel-container.board-vertical .panel-btn { padding: 3px 7px; font-size: 9px; }
#panel-container.board-vertical .panel-actions { gap: 3px; }
#panel-container.board-vertical .panel-body::-webkit-scrollbar { width: 4px; }
#panel-container.board-vertical .panel-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
#panel-container.board-vertical .task-card { width: 100% !important; }
.panel-body.dov { background: rgba(91,143,255,0.05) !important; outline: 1px dashed rgba(91,143,255,0.3); outline-offset: -8px; }

/* Panel header */
.panel.panel-drop-target { border-color: var(--accent) !important; border-style: dashed !important; background: rgba(91,143,255,0.04) !important; }
.panel-header { display: flex; align-items: center; flex-wrap: wrap; padding: 10px 14px; gap: 6px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; transition: background 0.2s; cursor: grab; }
.panel-header:active { cursor: grabbing; }
.panel-header.cs-stripe { border-left: 4px solid #111; }
.panel-header.cs-tint   { border-left: 4px solid transparent; }
.panel-header.cs-full   { border-left: none; }
.panel-name-input { flex: 0 1 auto; min-width: 40px; max-width: 220px; background: none; border: none; color: var(--text); font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; outline: none; transition: color 0.2s; cursor: text; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-radius: 3px; padding: 0 2px; }
.panel-name-input:focus { text-overflow: clip; overflow: visible; background: rgba(255,255,255,0.06); }
.panel-name-input:empty::before { content: 'Panel name…'; color: var(--text-muted); }
.panel-actions { display: flex; gap: 5px; flex-shrink: 0; }
.panel-btn { padding: 4px 9px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.18); font-family: 'IBM Plex Mono', monospace; font-size: 10px; cursor: pointer; transition: all 0.15s; white-space: nowrap; background: rgba(0,0,0,0.28); color: rgba(255,255,255,0.9); }
.panel-btn:hover { background: rgba(0,0,0,0.45); color: #fff; border-color: rgba(255,255,255,0.35); }
.panel-header.cs-full .panel-btn { background: rgba(0,0,0,0.30); border-color: rgba(255,255,255,0.25); color: #fff; }
.panel-header.cs-full .panel-btn:hover { background: rgba(0,0,0,0.50); border-color: rgba(255,255,255,0.45); }
.panel-btn.panel-btn-del { color: #ff7070 !important; border-color: rgba(255,100,100,0.35) !important; }
.panel-btn.panel-btn-del:hover { background: rgba(180,40,40,0.45) !important; border-color: rgba(255,100,100,0.6) !important; }
.panel-header.cs-full .panel-btn.panel-btn-del { background: rgba(140,20,20,0.45) !important; border-color: rgba(255,100,100,0.55) !important; color: #fff !important; }
.panel-header.cs-full .panel-btn.panel-btn-del:hover { background: rgba(180,30,30,0.7) !important; border-color: rgba(255,120,120,0.8) !important; color: #fff !important; }

/* Task card */
.task-card { width: 196px; border-radius: var(--radius); border: 2px solid #111111; background: #2d2d2d; padding: 10px; cursor: grab; transition: transform 0.18s cubic-bezier(.2,.8,.4,1), box-shadow 0.18s, opacity 0.18s; position: relative; user-select: none; display: flex; flex-direction: column; }
.task-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.5); }
.task-card.dragging { opacity: 0.3; cursor: grabbing; transform: scale(0.96) rotate(-1deg); }
.task-card.task-drop-before { box-shadow: 0 -3px 0 0 var(--accent); margin-top: 3px; }
.task-title { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 7px; line-height: 1.4; word-break: break-word; }
.date-badge { font-family: 'IBM Plex Mono', monospace; font-size: 9.5px; font-weight: 500; padding: 3px 7px; border-radius: 4px; display: inline-block; margin-bottom: 7px; letter-spacing: 0.2px; }
.task-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 7px; }
.task-tag { font-family: 'IBM Plex Mono', monospace; font-size: 9px; padding: 2px 6px; border-radius: 3px; background: rgba(0,0,0,0.3); color: rgba(255,255,255,0.85); }
.task-btns { display: flex; gap: 4px; margin-top: auto; }
.card-btn { flex: 1; padding: 5px 6px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.18); background: rgba(0,0,0,0.3); color: rgba(255,255,255,0.88); font-size: 10px; font-family: 'IBM Plex Mono', monospace; cursor: pointer; transition: all 0.15s; font-weight: 600; }
.card-btn:hover { background: rgba(0,0,0,0.5); color: #fff; border-color: rgba(255,255,255,0.35); }
.card-btn.done:hover { background: rgba(50,180,100,0.35); color: #50c86a; border-color: rgba(80,200,110,0.5); }
.empty-panel-hint { color: var(--text-muted); font-size: 11px; font-family: 'IBM Plex Mono', monospace; align-self: center; padding: 8px 0; }

/* ══ FILTER BAR ══ */
.filter-bar { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; padding: 10px 20px; border-bottom: 1px solid var(--border); background: var(--surface); }
.filter-bar-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text-muted); letter-spacing: 0.8px; text-transform: uppercase; flex-shrink: 0; }
.filter-chip { display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); cursor: pointer; transition: all 0.15s; user-select: none; }
.filter-chip input[type="checkbox"] { display: none; }
.filter-chip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: var(--border2); }
.filter-chip span { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text-muted); }
.filter-chip.checked { border-color: var(--border2); background: var(--surface3); }
.filter-chip.checked span { color: var(--text); }
.filter-bar-toggle { margin-left: auto; padding: 4px 10px; border-radius: 5px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; font-size: 9px; cursor: pointer; letter-spacing: 0.5px; transition: all 0.15s; }
.filter-bar-toggle:hover { color: var(--text); border-color: var(--border2); }

/* ══ CALENDAR ══ */
.cal-body { padding: 20px; }
.cal-header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
.cal-nav-btn { width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.cal-nav-btn:hover { border-color: var(--border2); }
.cal-today-btn { padding: 0 12px; height: 30px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text-dim); cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.5px; transition: all 0.15s; }
.cal-today-btn:hover { color: var(--text); border-color: var(--border2); }
#cal-month-title { font-size: 17px; font-weight: 700; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
.cal-day-hdr { background: var(--surface2); padding: 7px; text-align: center; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text-muted); letter-spacing: 1px; }
.cal-cell { background: var(--surface); min-height: 96px; padding: 6px; transition: background 0.15s; min-width: 0; overflow: hidden; }
.cal-cell.other { background: var(--bg); }
.cal-cell.today { background: rgba(91,143,255,0.05); }
.cal-cell.dov { background: rgba(91,143,255,0.1); }
.cal-day-num { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
.cal-cell.today .cal-day-num { color: var(--accent); font-weight: 700; }
.cal-task { font-size: 10px; line-height: 1.2; height: 30px; padding: 2px 5px; border-radius: 3px; margin-bottom: 3px; cursor: grab; border-left: 2px solid #555; background: #2d2d2d; color: var(--text); overflow: hidden; font-weight: 600; font-family: 'IBM Plex Mono', monospace; transition: opacity 0.12s; position: relative; z-index: 1; box-sizing: border-box; }
.cal-task:hover { opacity: 0.8; }
.cal-task-cont { opacity: 0.75; }
.cal-task-gap { height: 30px; margin-bottom: 3px; visibility: hidden; pointer-events: none; box-sizing: border-box; }
.cal-task.cal-dragging { opacity: 0.25; outline: 2px dashed rgba(255,255,255,0.4); outline-offset: -2px; }
.ct-title { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 10px; }
.ct-label { display: block; font-size: 8px; opacity: 0.8; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ct-label-end { text-align: right; }
.ct-label-row { display: flex; justify-content: space-between; gap: 4px; margin-top: 1px; font-size: 8px; opacity: 0.8; overflow: hidden; }
.ct-label-row span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; flex: 1; }
.ct-label-row span:last-child { text-align: right; }
.cal-more { font-size: 9px; line-height: 1; padding: 2px 5px; border-radius: 3px; background: rgba(91,143,255,0.15); color: var(--accent); cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-weight: 600; display: inline-block; margin-top: 2px; }
.cal-more:hover { background: rgba(91,143,255,0.25); }
.cal-day-popover { position: fixed; z-index: 8000; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 8px; box-shadow: 0 12px 40px rgba(0,0,0,0.6); max-width: 280px; }
.cal-day-popover .cal-task { width: auto !important; margin-left: 0 !important; margin-right: 0 !important; border-radius: 3px !important; border-left: 3px solid var(--border2) !important; border-right: none !important; }
.cal-day-popover-title { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.5px; }
/* Continuation indicators for tasks spanning beyond visible month */
.cal-task .ct-cont-prev { font-weight: 800; opacity: 0.6; margin-right: 2px; }
.cal-task .ct-cont-next { font-weight: 800; opacity: 0.6; margin-left: 2px; }

/* ══ ARCHIVE ══ */
.archive-body { padding: 20px; }
.archive-empty { color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; font-size: 13px; padding: 40px 0; text-align: center; }
.archive-group-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin: 18px 0 8px; padding-bottom: 5px; border-bottom: 1px solid var(--border); }
.archive-group-label:first-child { margin-top: 0; }
.archive-item { display: flex; align-items: center; gap: 12px; padding: 11px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; }
.archive-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.archive-title { flex: 1; font-size: 13px; color: var(--text-muted); text-decoration: line-through; min-width: 0; }
.archive-meta { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text-muted); white-space: nowrap; }
.sm-btn { padding: 4px 10px; border-radius: 5px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; font-size: 10px; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
.sm-btn:hover { color: var(--text); border-color: var(--border2); }

/* ══ ALL BOARDS ══ */
.ab-body { padding: 24px; }
.ab-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
}
.ab-header h2 { font-size: 18px; font-weight: 800; }
.ab-new-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 18px; border-radius: var(--radius);
  border: none; background: var(--accent);
  color: #fff; font-family: 'Syne', sans-serif;
  font-size: 12px; font-weight: 700; letter-spacing: 0.5px;
  cursor: pointer; transition: all 0.15s;
}
.ab-new-btn:hover { opacity: 0.85; }
.ab-empty { color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 40px 0; text-align: center; }
.ab-card {
  display: flex; align-items: center; gap: 16px;
  padding: 16px 18px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius-lg);
  margin-bottom: 10px; transition: border-color 0.15s;
}
.ab-card:hover { border-color: var(--border2); }
.ab-card-stripe {
  width: 4px; height: 42px; border-radius: 2px;
  flex-shrink: 0; background: var(--border2);
}
.ab-card-info { flex: 1; min-width: 0; }
.ab-card-name {
  background: none; border: none; color: var(--text);
  font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
  outline: none; width: 100%; padding: 2px 0;
  border-bottom: 1px solid transparent; transition: border-color 0.15s;
}
.ab-card-name:focus { border-bottom-color: var(--accent); }
.ab-card-meta { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text-muted); margin-top: 4px; }
.ab-card-actions { display: flex; gap: 6px; flex-shrink: 0; }
.ab-open-btn {
  padding: 5px 13px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text-dim); font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.ab-open-btn:hover { color: var(--text); border-color: var(--border2); }
.ab-del-btn {
  padding: 5px 13px; border-radius: 6px;
  border: 1px solid #3a1515; background: rgba(200,60,60,0.08);
  color: #c05050; font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.ab-del-btn:hover { background: rgba(200,60,60,0.18); color: #e05555; border-color: #5a1a1a; }

/* ══ POINTER DRAG ══ */
.pd-ghost { position:fixed; z-index:9999; pointer-events:none; opacity:0.93; transform:rotate(2deg) scale(1.04); box-shadow:0 20px 60px rgba(0,0,0,0.8); border-radius:var(--radius); will-change:left,top; }
.task-placeholder { border-radius:var(--radius); background:rgba(91,143,255,0.08); border:2px dashed rgba(91,143,255,0.4); flex-shrink:0; box-sizing:border-box; }
.panel-body > .task-placeholder:only-child { grid-column:1 / -1; min-height:60px; width:100%; }
.panel-placeholder { border-radius:var(--radius-lg); background:rgba(91,143,255,0.05); border:2px dashed rgba(91,143,255,0.3); flex-shrink:0; box-sizing:border-box; }

/* ══ MODALS ══ */
.modal-bd { position: fixed; inset: 0; z-index: 500; background: rgba(0,0,0,0.65); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; padding: 16px; }
.modal { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 22px; width: 460px; max-width: 100%; max-height: 88vh; overflow-y: auto; overscroll-behavior: contain; }
.modal-title { font-size: 16px; font-weight: 800; margin-bottom: 18px; }

  .ct-title { font-size: 8px; }

  .filter-bar { padding: 8px 12px; gap: 6px; flex-wrap: wrap; }

  .dim-note { font-size: 9px; }

  /* Archive */
  .archive-body { padding: 12px; }
  .archive-item { flex-wrap: wrap; gap: 8px; padding: 10px 12px; }

  .ab-card-info { min-width: 0; width: 100%; }
  .ab-card-actions { width: 100%; display: flex; gap: 8px; }
  .ab-open-btn, .ab-del-btn { flex: 1; text-align: center; }

  /* Modals — bottom sheet */

  .modal::before { content: ''; display: block; width: 36px; height: 4px; border-radius: 2px; background: var(--border2); margin: 0 auto 16px; }
  .modal-title { font-size: 15px; }

  .settings-modal .stbl th:last-child, .settings-modal .stbl td:last-child { width: 30px; }
  .stbl-input { font-size: 13px; padding: 6px 8px; }

}

<body>
<div id="bg-layer"></div>

<input type="file" id="import-file-input" accept=".json" style="display:none" onchange="handleImportFile(this)">

<header>
  <div class="logo">TASKBOARD</div>
  <div class="view-tabs" role="tablist">
    <button class="view-tab-btn active" data-view="board" onclick="switchView('board',this)" role="tab" aria-label="Board view">Board</button>
    <button class="view-tab-btn" data-view="calendar" onclick="switchView('calendar',this)" role="tab" aria-label="Calendar view">Calendar</button>
    <button class="view-tab-btn" data-view="archive" onclick="switchView('archive',this)" role="tab" aria-label="Archive view">Archive</button>
    <button class="view-tab-btn" data-view="allboards" onclick="switchView('allboards',this)" role="tab" aria-label="All boards">All Boards</button>
  </div>
  <div style="flex:1"></div>
  <button class="hdr-io-btn save" onclick="exportSave()" title="Export save file" aria-label="Export save file">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M8 1v9M5 7l3 3 3-3"/><rect x="2" y="11" width="12" height="4" rx="1"/>
    </svg>
    <span>Export</span>
  </button>
  <button class="hdr-io-btn load" onclick="triggerImport()" title="Import save file" aria-label="Import save file">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M8 11V2M5 5l3-3 3 3"/><rect x="2" y="11" width="12" height="4" rx="1"/>
    </svg>
    <span>Import</span>
  </button>
  <button class="hdr-btn" onclick="openSettings()" title="Settings" aria-label="Open settings">&#9881;</button>
</header>

<!-- Board tabs sub-bar -->
<div class="board-tabs-bar" id="board-tabs-bar">
  <div class="group-tabs-wrap" id="group-tabs-wrap"></div>
</div>

<div id="toast"></div>

<!-- BOARD -->
<div id="board-view" class="view-content active" role="region" aria-label="Board view">
  <div id="board-wrap">
    <button class="add-panel-btn" onclick="addPanel()" aria-label="Add new panel">+ NEW PANEL</button>

      <button class="cal-nav-btn" onclick="calNav(1)" aria-label="Next month">&#8250;</button>

    </div>

<div id="modals"></div>

<script>
// ══════════════════════════════════════
//  STATE
// ══════════════════════════════════════
const DEFAULT_SETTINGS = () => ({
  bgImage:'', bgBlur:0, bgColor:'', panelLayout:'horizontal', panelColorStyle:'stripe'
});

let S = { groups:[], tasks:[] };
let activeGroupId = null;
let calFilterIds = null;
let arcFilterIds = null;
let _pendingBgData = null;
let _undoBuf = null;          // last delete, for undo
let _undoToastTimer = null;
let _lastTodayISO = null;     // for setInterval freshness check
let _panelByIdCache = null;   // built lazily

// Build / invalidate the panel lookup cache (O(1) panel lookups after first call)
function invalidatePanelCache() { _panelByIdCache = null; }
function panelByIdCached(id) {
  if (!_panelByIdCache) {
    _panelByIdCache = new Map();
    for (const g of S.groups) for (const p of g.panels) _panelByIdCache.set(p.id, {panel:p, group:g});
  }
  return _panelByIdCache.get(id) || null;
}

// ── UNDO STACK (single-step) ───────────────────────────
// _undoBuf shape: { kind, label, ...payload }
function _pushUndo(entry) {
  _undoBuf = entry;
  showUndoToast(entry.label);
}
function _doUndo() {
  if (!_undoBuf) return;
  const u = _undoBuf; _undoBuf = null;
  hideUndoToast();
  try {
    if (u.kind === 'task') {
      S.tasks.splice(Math.min(u.index, S.tasks.length), 0, u.task);
    } else if (u.kind === 'panel') {
      const g = groupById(u.groupId);
      if (g) {
        g.panels.splice(Math.min(u.index, g.panels.length), 0, u.panel);
        u.tasks.forEach(t => S.tasks.push(t));
      }
    } else if (u.kind === 'group') {
      S.groups.push(u.group);
      u.tasks.forEach(t => S.tasks.push(t));
      if (u.wasActive) activeGroupId = u.group.id;
    }
    invalidatePanelCache();
    save();
    renderGroupTabs(); renderBoard(); renderCalendar(); renderArchive(); renderAllBoards();
    renderCalFilter(); renderArcFilter(); applyBg();
    showToast('&#x21A9; Restored.');
  } catch(e) {
    showToast('Undo failed: '+e.message);
  }
}
function showUndoToast(label) {
  hideUndoToast();
  const t = document.getElementById('toast');
  t.innerHTML = `${esc(label)} &nbsp; <button id="undo-toast-btn" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.25);color:#fff;padding:3px 9px;border-radius:4px;font:600 10px 'IBM Plex Mono',monospace;cursor:pointer;margin-left:6px;letter-spacing:0.5px;">UNDO</button>`;
  t.classList.add('show');
  // Stop the regular toast timer from clearing this one
  clearTimeout(_toastTimer);
  document.getElementById('undo-toast-btn')?.addEventListener('click', _doUndo);
  _undoToastTimer = setTimeout(()=>{
    t.classList.remove('show');
    _undoBuf = null;
  }, 8000);
}
function hideUndoToast() {
  clearTimeout(_undoToastTimer);
  const t = document.getElementById('toast');
  if (t) t.classList.remove('show');
}

// ── FOCUS TRAP for modals ──────────────────────────────
function trapFocus(root) {
  if (!root) return;
  const sel = 'a[href],button:not([disabled]),input:not([disabled]):not([type="hidden"]),select:not([disabled]),textarea:not([disabled]),[tabindex]:not([tabindex="-1"]),[contenteditable="true"]';
  function onKey(e) {
    if (e.key !== 'Tab') return;
    const items = [...root.querySelectorAll(sel)].filter(el => el.offsetParent !== null);
    if (!items.length) return;
    const first = items[0], last = items[items.length-1];
    if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
  }
  root.addEventListener('keydown', onKey);
}

// ── DEBOUNCED SAVE — bundles rapid mutations ───────────
let _saveTimer = null;
function saveDebounced() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(save, 250);
}

// Image size limits
const MAX_BG_IMAGE_BYTES = 1_500_000;       // ~1.5MB raw upload
const MAX_BG_DATA_URL_LEN = 2_000_000;       // ~2MB after compression
const MAX_IMPORT_BYTES = 15_000_000;         // 15MB import file cap

function load() {
  try {
    const raw = localStorage.getItem('tb3_state');
    if (raw) {
      const parsed = JSON.parse(raw);
      if (!parsed || !Array.isArray(parsed.groups) || !Array.isArray(parsed.tasks)) {
        throw new Error('Saved state has wrong shape.');
      }
      S = parsed;
      S.groups.forEach(g => {
        g.settings = Object.assign(DEFAULT_SETTINGS(), g.settings||{});
        g.subjects = g.subjects || [];
        g.taskTypes = g.taskTypes || [];
        g.panels = g.panels || [];
      });
      invalidatePanelCache();
      return;
    }
    const old = localStorage.getItem('tb2_state');
    if (old) { migrateOld(JSON.parse(old)); return; }
  } catch(e) {
    // Back up corrupt blob so user data isn't silently lost
    try {
      const raw = localStorage.getItem('tb3_state');
      if (raw) {
        const key = 'tb3_corrupt_' + Date.now();
        localStorage.setItem(key, raw);
        setTimeout(() => showToast(`&#x26A0; Saved data was corrupt — backed up to "${key}". Starting fresh.`), 100);
      }
    } catch(_) {}
    S = { groups:[], tasks:[] };
  }
  if (!S.groups.length) createGroup('My Board');
}

function migrateOld(old) {
  const g = createGroup('My Board', false);
  g.panels    = old.panels    || [];
  g.subjects  = old.subjects  || [];
  g.taskTypes = old.taskTypes || [];
  g.settings  = Object.assign(DEFAULT_SETTINGS(), old.settings||{});
  S.tasks = (old.tasks||[]).map(t => ({...t, groupId: g.id}));
  save();
}

function save() {
  try { localStorage.setItem('tb3_state', JSON.stringify(S)); }
  catch(e) { alert('Storage quota exceeded — try a smaller background image.'); }
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function createGroup(name, andSave=true) {
  const g = { id:uid(), name, panels:[], subjects:[], taskTypes:[], settings:DEFAULT_SETTINGS() };
  S.groups.push(g);
  if (andSave) save();
  return g;
}

function activeGroup() { return S.groups.find(g=>g.id===activeGroupId) || S.groups[0] || null; }
function groupById(id) { return S.groups.find(g=>g.id===id) || null; }
function calVisibleGroups() { return calFilterIds ? S.groups.filter(g=>calFilterIds.has(g.id)) : S.groups; }
function arcVisibleGroups() { return arcFilterIds ? S.groups.filter(g=>arcFilterIds.has(g.id)) : S.groups; }
function subj(id, g)  { return (g||activeGroup())?.subjects.find(s=>s.id===id) || null; }
function ttype(id, g) { return (g||activeGroup())?.taskTypes.find(t=>t.id===id) || null; }
function panelObj(id) { return panelByIdCached(id)?.panel || null; }
function task(id)     { return S.tasks.find(t=>t.id===id) || null; }

// ══════════════════════════════════════
//  SAVE / LOAD  (export & import JSON)
// ══════════════════════════════════════
function exportSave() {
  try {
    const filename=`taskboard-${new Date().toISOString().slice(0,10)}.json`;
    const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    showToast('&#10003; Saved as '+filename);
  } catch(e){ showToast('Export failed: '+e.message); }
}
function triggerImport() {
  document.getElementById('import-file-input').value='';
  document.getElementById('import-file-input').click();
}
function handleImportFile(input) {
  const file=input.files[0]; if(!file) return;
  if (file.size > MAX_IMPORT_BYTES) {
    showToast('&#x2715; Import failed — file too large (max ' + Math.round(MAX_IMPORT_BYTES/1e6) + 'MB)');
    return;
  }
  const reader=new FileReader();
  reader.onload=e=>{
    try {
      const parsed=JSON.parse(e.target.result);
      if(!parsed.groups||!Array.isArray(parsed.groups)||!Array.isArray(parsed.tasks))
        throw new Error('File does not look like a Taskboard save.');
      if(!parsed.groups.length)
        throw new Error('Save contains no boards.');
      // Normalize each group's required fields (defensive against partial exports)
      parsed.groups.forEach(g=>{
        g.settings = Object.assign(DEFAULT_SETTINGS(), g.settings||{});
        g.panels   = Array.isArray(g.panels)   ? g.panels   : [];
        g.subjects = Array.isArray(g.subjects) ? g.subjects : [];
        g.taskTypes= Array.isArray(g.taskTypes)? g.taskTypes: [];
      });
      confirmModal(`Load "${file.name}"? This will replace all current boards and tasks.`,()=>{
        S=parsed; activeGroupId=S.groups[0]?.id||null;
        calFilterIds=null; arcFilterIds=null;
        invalidatePanelCache();
        save(); renderGroupTabs(); renderBoard();
        renderCalFilter(); renderArcFilter(); applyBg();
        showToast('&#10003; Loaded from '+esc(file.name));
      }, {okLabel:'Load', destructive:false});
    } catch(err){ showToast('&#x2715; Import failed — '+esc(err.message)); }
  };
  reader.onerror = () => showToast('&#x2715; Could not read file.');
  reader.readAsText(file);
}

// ══════════════════════════════════════
//  DATE HELPERS
// ══════════════════════════════════════
function todayMidnight() { const d=new Date(); d.setHours(0,0,0,0); return d; }
function daysUntil(iso) {
  if (!iso) return null;
  const [y,m,d]=iso.split('-').map(Number);
  const due=Date.UTC(y,m-1,d);
  const now=new Date();
  const todayUtc=Date.UTC(now.getFullYear(),now.getMonth(),now.getDate());
  return Math.round((due-todayUtc)/86400000);
}
function todayISO() {
  const n=new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}
// Parse ISO 'YYYY-MM-DD' as a date in the local timezone — no UTC interpretation.
// Avoids `new Date('2026-05-19')` (UTC midnight) shifting one day in negative-offset TZs.
function parseISOLocal(iso) {
  const [y,m,d]=iso.split('-').map(Number);
  return new Date(y, m-1, d);
}
function fmtDate(iso) {
  if (!iso) return '';
  const d=parseISOLocal(iso);
  return `${d.getDate()}/${String(d.getMonth()+1).padStart(2,'0')}`;
}
function formatDateLabel(iso) {
  if (!iso) return null;
  const diff=daysUntil(iso);
  const ds=fmtDate(iso);
  if (diff<0)   return `${Math.abs(diff)}d Overdue | ${ds}`;
  if (diff===0) return `Due Today | ${ds}`;
  if (diff===1) return `1 Day Left | ${ds}`;
  return `${diff} Days Left | ${ds}`;
}
function formatArchiveDate(iso) {
  if (!iso) return '—';
  const d=parseISOLocal(iso);
  return `${d.getDate()} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]} ${d.getFullYear()}`;
}
function dateBadgeStyle(iso) {
  if (!iso) return null;
  const diff=daysUntil(iso);
  if (diff<0)  return 'background:#3d1010;color:#e06060;';
  if (diff>14) return 'background:#1a1a22;color:#4a4a66;';
  const t=1-(diff/14);
  const r=Math.round(28+t*227), g=Math.round(28+t*192), b=Math.round(32*(1-t*0.97));
  const lum=(0.299*r+0.587*g+0.114*b)/255;
  let tc; if(lum<0.30) tc='#ccaa00'; else if(lum<0.62) tc='#ffffff'; else tc='#1a1000';
  return `background:rgb(${r},${g},${b});color:${tc};`;
}
// Start date badge — black→green as start approaches; green→yellow once started+due near
function startBadgeInfo(startISO, dueISO) {
  if (!startISO) return null;
  const sd=daysUntil(startISO), ds=fmtDate(startISO);
  if (sd > 14) return { style:'background:#1a1a22;color:#4a4a66;', label:`Starts in ${sd}d | ${ds}` };
  if (sd > 0) {
    const t=1-(sd/14);
    const r=Math.round(26*(1-t)), gc=Math.round(26+t*134), bc=Math.round(26*(1-t*0.8));
    const lum=(0.299*r+0.587*gc+0.114*bc)/255;
    return { style:`background:rgb(${r},${gc},${bc});color:${lum>0.35?'#001200':'#70cc88'};`, label:`Starts in ${sd}d | ${ds}` };
  }
  // Started
  const ago=Math.abs(sd), dd=dueISO?daysUntil(dueISO):null;
  if (dd!==null && dd<0) return { style:'background:#3d1010;color:#e06060;', label:`${Math.abs(dd)}d Overdue | ${fmtDate(dueISO)}` };
  if (dd!==null && dd<=14) {
    // Blend green→yellow by due proximity
    const t=1-(dd/14);
    const r=Math.round(30+t*225), gc=Math.round(160+t*50), bc=Math.round(60*(1-t));
    const lum=(0.299*r+0.587*gc+0.114*bc)/255;
    const tc=lum>0.5?'#1a1000':'#ffffff';
    const label=dd===0?`Due Today | ${fmtDate(dueISO)}`:`${dd} Day${dd!==1?'s':''} Left | ${fmtDate(dueISO)}`;
    return { style:`background:rgb(${r},${gc},${bc});color:${tc};`, label };
  }
  // Started, due far / no due
  const label=ago===0?`Started Today | ${ds}`:`Started ${ago}d ago | ${ds}`;
  return { style:'background:#0d2e18;color:#50c878;', label };
}

// ══════════════════════════════════════
//  UTILS
// ══════════════════════════════════════
function contrastColor(hex) {
  if (!hex||!hex.startsWith('#')) return '#e4e4ee';
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return ((0.299*r+0.587*g+0.114*b)/255)>0.52?'#111118':'#e4e4ee';
}
function hexAlpha(hex,a) {
  if (!hex||!hex.startsWith('#')) return `rgba(0,0,0,${a})`;
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function panelTasks(pid) {
  let tasks = S.tasks.filter(t=>t.panelId===pid&&!t.completed);
  const p = panelByIdCached(pid)?.panel || null;
  const sort = p?.sort || 'date';
  if (sort==='date') tasks.sort((a,b)=>{
    if (!a.dueDate&&!b.dueDate) return 0;
    if (!a.dueDate) return 1; if (!b.dueDate) return -1;
    return a.dueDate.localeCompare(b.dueDate); // ISO strings sort lexicographically
  });
  else if (sort==='alpha') tasks.sort((a,b)=>a.title.localeCompare(b.title));
  // 'none' = insertion order
  return tasks;
}

function renameGroup(id, name) {
  const g = groupById(id); if (!g) return;
  let trimmed = (name||'').trim();
  if (trimmed.length > 80) trimmed = trimmed.slice(0,80);
  if (!trimmed) {
    // Restore original value in the input + toast
    const inp = document.querySelector(`#ab-card-${id} .ab-card-name`);
    if (inp) inp.value = g.name;
    showToast('&#x26A0; Board name can&#39;t be empty.');
    return;
  }
  g.name = trimmed;
  save();
  renderGroupTabs();
  renderCalFilter();
  renderArcFilter();
  // Re-render the All Boards meta line (without losing focus)
  const metaEl = document.querySelector(`#ab-card-${id} .ab-card-meta`);
  if (metaEl) {
    const panelCount  = g.panels.length;
    const activeCount = S.tasks.filter(t=>t.groupId===id&&!t.completed).length;
    const doneCount   = S.tasks.filter(t=>t.groupId===id&&t.completed).length;
    metaEl.innerHTML = `${panelCount} panel${panelCount!==1?'s':''} &nbsp;·&nbsp; ${activeCount} active task${activeCount!==1?'s':''} &nbsp;·&nbsp; ${doneCount} completed`;
  }
}

function deleteGroup(id) {
  const g = groupById(id);
  if (S.groups.length <= 1) return; // can't delete last board
  if (!g) return;
  confirmModal(`Delete board "${g.name}" and all its panels and tasks?`, () => {
    // snapshot for undo
    const removedTasks = S.tasks.filter(t => t.groupId === id);
    const removedGroup = g;
    const wasActive = (activeGroupId === id);
    _pushUndo({
      kind:'group',
      group:JSON.parse(JSON.stringify(removedGroup)),
      tasks:JSON.parse(JSON.stringify(removedTasks)),
      wasActive,
      label:`Board "${g.name}" deleted`,
    });
    S.tasks  = S.tasks.filter(t => t.groupId !== id);
    S.groups = S.groups.filter(x => x.id !== id);
    if (wasActive) activeGroupId = S.groups[0]?.id || null;
    invalidatePanelCache();
    save();
    renderGroupTabs();
    renderAllBoards();
    renderCalFilter();
    renderArcFilter();
    applyBg();
  });
}

}

function renderCalFilter() { renderFilterBar('cal-filter-bar', calFilterIds); }
function renderArcFilter() { renderFilterBar('arc-filter-bar', arcFilterIds); }

function onFilterChange(barId, groupId, checked) {
  const isCal = barId === 'cal-filter-bar';
  let fs = isCal ? calFilterIds : arcFilterIds;
  if (fs === null) fs = new Set(S.groups.map(g=>g.id));
  if (checked) fs.add(groupId); else fs.delete(groupId);
  if (fs.size === S.groups.length) fs = null;
  if (isCal) { calFilterIds = fs; renderCalFilter(); renderCalendar(); }
  else        { arcFilterIds = fs; renderArcFilter(); renderArchive(); }
}

function toggleFilterAll(barId) {
  const isCal = barId === 'cal-filter-bar';
  const fs = isCal ? calFilterIds : arcFilterIds;
  // If currently all selected (fs === null), clear to empty set. Otherwise select all.
  const newFs = (fs === null) ? new Set() : null;
  if (isCal) { calFilterIds = newFs; renderCalFilter(); renderCalendar(); }
  else       { arcFilterIds = newFs; renderArcFilter(); renderArchive(); }
}

// ══════════════════════════════════════
//  RENDER CALENDAR
// ══════════════════════════════════════
let calY=new Date().getFullYear(), calM=new Date().getMonth();
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

// Returns all ISO date strings between two ISO dates (inclusive), UTC-safe
function getDaysInRange(startISO, endISO) {
  const days=[];
  const [sy,sm,sd]=startISO.split('-').map(Number);
  const [ey,em,ed]=endISO.split('-').map(Number);
  for (let ms=Date.UTC(sy,sm-1,sd),end=Date.UTC(ey,em-1,ed); ms<=end; ms+=86400000)
    days.push(new Date(ms).toISOString().slice(0,10));
  return days;
}

function taskSpanDays(t) {
  if (t.startDate&&t.dueDate) return daysBetween(t.startDate,t.dueDate);
  return 0;
}

// Assign a consistent vertical row to each task so longer tasks always appear
// closest to the top across every day cell they occupy.
function assignCalRows(tasks, monthStart, monthEnd) {
  // Sort: longer span first, then earlier start
  const sorted=[...tasks].sort((a,b)=>{
    const diff=taskSpanDays(b)-taskSpanDays(a);
    if (diff!==0) return diff;
    const sA=a.startDate||a.dueDate||'';
    const sB=b.startDate||b.dueDate||'';
    return sA<sB?-1:1;
  });

  const occupied={};  // iso -> Set<rowIndex>
  const taskRow={};

  for (const t of sorted) {
    const start=t.startDate||t.dueDate;
    const end=t.dueDate||t.startDate;
    const days=getDaysInRange(
      start<monthStart?monthStart:start,
      end>monthEnd?monthEnd:end
    );
    let row=0;
    while (days.some(d=>occupied[d]?.has(row))) row++;
    taskRow[t.id]=row;
    days.forEach(d=>{ (occupied[d]=occupied[d]||new Set()).add(row); });
  }
  return taskRow;
}

function renderCalendar() {
  document.getElementById('cal-month-title').textContent=`${MONTHS[calM]} ${calY}`;
  const now=new Date();
  const todayIso=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const first=new Date(calY,calM,1).getDay();
  const last=new Date(calY,calM+1,0).getDate();
  const monthStart=`${calY}-${String(calM+1).padStart(2,'0')}-01`;
  const monthEnd=`${calY}-${String(calM+1).padStart(2,'0')}-${String(last).padStart(2,'0')}`;
  const visIds=new Set(calVisibleGroups().map(g=>g.id));
  const multiGroup=S.groups.length>1;
  // Row cap — anything beyond rolls up into "+N more"
  const MAX_VISIBLE_ROWS = window.innerWidth <= 640 ? 3 : 4;

  const active=S.tasks.filter(t=>{
    if (t.completed||!visIds.has(t.groupId)) return false;
    if (t.startDate&&t.dueDate) return t.startDate<=monthEnd&&t.dueDate>=monthStart;
    if (t.dueDate)   return t.dueDate>=monthStart&&t.dueDate<=monthEnd;
    if (t.startDate) return t.startDate>=monthStart&&t.startDate<=monthEnd;
    return false;
  });

  // Pre-assign consistent rows so each task holds the same vertical slot every day
  const taskRow=assignCalRows(active, monthStart, monthEnd);

  let h=DAYS.map(d=>`<div class="cal-day-hdr">${d}</div>`).join('');
  for (let i=0;i<first;i++) {
    const d=new Date(calY,calM,1-first+i);
    h+=`<div class="cal-cell other"><div class="cal-day-num">${d.getDate()}</div></div>`;
  }

  for (let d=1;d<=last;d++) {
    const iso=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=iso===todayIso;
    const dayTasks=active.filter(t=>{
      if (t.startDate&&t.dueDate) return t.startDate<=iso&&iso<=t.dueDate;
      if (t.dueDate)   return t.dueDate===iso;
      if (t.startDate) return t.startDate===iso;
      return false;
    });

    // Build a row-index→task map for this day
    const rowMap={};
    dayTasks.forEach(t=>{ rowMap[taskRow[t.id]||0]=t; });
    const maxRow=dayTasks.length?Math.max(...dayTasks.map(t=>taskRow[t.id]||0)):-1;
    const visibleMaxRow = Math.min(maxRow, MAX_VISIBLE_ROWS - 1);
    const hiddenTasks = dayTasks.filter(t => (taskRow[t.id]||0) > visibleMaxRow);

    h+=`<div class="cal-cell${isToday?' today':''}" data-date="${iso}"
      ondragover="ev_calOver(event)" ondrop="ev_calDrop(event,'${iso}')" ondragleave="ev_calLeave(event)">
      <div class="cal-day-num">${d}</div>`;

    // Render slots 0..visibleMaxRow, inserting invisible gaps where no task occupies that row
    for (let row=0; row<=visibleMaxRow; row++) {
      const t=rowMap[row];
      if (!t) { h+=`<div class="cal-task-gap">&nbsp;</div>`; continue; }
      h += renderCalChip(t, iso, monthStart, monthEnd, multiGroup);
    }
    // "+N more" — clickable popover trigger
    if (hiddenTasks.length) {
      h += `<div class="cal-more" onclick="showDayPopover(event,'${iso}')">+${hiddenTasks.length} more</div>`;
    }
    h+=`</div>`;
  }

  const total=Math.ceil((first+last)/7)*7;
  for (let i=last+first;i<total;i++)
    h+=`<div class="cal-cell other"><div class="cal-day-num">${i-last-first+1}</div></div>`;
  document.getElementById('cal-grid').innerHTML=h;
}

// Render one calendar chip — extracted so the popover can reuse it.
function renderCalChip(t, iso, monthStart, monthEnd, multiGroup, plain=false) {
  const tg=groupById(t.groupId);
  const s=tg?subj(t.subjectId,tg):null, ty=tg?ttype(t.typeId,tg):null;
  const borderCol=s?s.color:'#444455', bgCol=ty?ty.color:'#2d2d2d';
  const label=(multiGroup&&tg)?`${esc(t.title)} [${esc(tg.name)}]`:esc(t.title);
  const isSpanning=t.startDate&&t.dueDate&&t.startDate!==t.dueDate;
  const isFirst=!t.startDate||t.startDate===iso;
  const isLast=!t.dueDate||t.dueDate===iso;
  const dow=parseISOLocal(iso).getDay();
  const rowStart=isFirst||dow===0;
  const rowEnd=isLast||dow===6;

  // Cross-month continuation indicators — show ◂ if this is the first visible day
  // in the month and the task started earlier; show ▸ on the last visible day
  // when the task continues past the visible month.
  const continuesBefore = !!(t.startDate && t.startDate < monthStart && iso === monthStart);
  const continuesAfter  = !!(t.dueDate   && t.dueDate   > monthEnd   && iso === monthEnd);
  const contPrev = continuesBefore ? `<span class="ct-cont-prev" title="Continues from previous month">&#9666;</span>` : '';
  const contNext = continuesAfter  ? `<span class="ct-cont-next" title="Continues into next month">&#9656;</span>`   : '';

  let chipStyle=`background:${bgCol};`;
  let chipClass='cal-task';
  let chipText='';
  const twoLine = (title, label, endAlign=false) =>
    `<span class="ct-title">${contPrev}${title}${contNext}</span><span class="ct-label${endAlign?' ct-label-end':''}">${label}</span>`;

  if (plain) {
    // Popover variant: no negative margins, no border-radius hacks — just a clean chip
    chipStyle += `border-left:3px solid ${borderCol};border-radius:3px;`;
    chipText = `<span class="ct-title">${contPrev}${esc(t.title)}${contNext}</span>`;
    if (t.startDate && t.dueDate && t.startDate !== t.dueDate) {
      chipText += `<span class="ct-label">${esc(t.startDate)} &rarr; ${esc(t.dueDate)}</span>`;
    } else if (t.dueDate) {
      chipText += `<span class="ct-label">Due ${esc(t.dueDate)}</span>`;
    } else if (t.startDate) {
      chipText += `<span class="ct-label">Starts ${esc(t.startDate)}</span>`;
    }
  } else if (isSpanning) {
    const extL=rowStart?6:7, extR=rowEnd?6:7;
    chipStyle+=`width:calc(100% + ${extL+extR}px);margin-left:-${extL}px;margin-right:-${extR}px;`;
    const rl=rowStart?'3px':'0', rr=rowEnd?'3px':'0';
    chipStyle+=`border-radius:${rl} ${rr} ${rr} ${rl};`;
    chipStyle+=rowStart?`border-left:3px solid ${borderCol};`:'border-left:none;';
    chipStyle+=isLast?`border-right:3px solid ${borderCol};`:'border-right:none;';
    if (isFirst && isLast)      chipText = `<span class="ct-title">${contPrev}${esc(t.title)}${contNext}</span>`;
    else if (isFirst)           chipText = twoLine(esc(t.title), '— Start');
    else if (isLast)          { chipText = twoLine(esc(t.title), 'End —', true); chipClass+=' cal-task-cont'; }
    else                      { chipText = ''; chipClass+=' cal-task-cont'; }  // middle days: coloured bar only
  } else {
    chipStyle+=`width:calc(100% + 12px);margin-left:-6px;margin-right:-6px;`;
    chipStyle+=`border-left:3px solid ${borderCol};border-right:3px solid ${borderCol};border-radius:3px;`;
    if (t.startDate && !t.dueDate)              chipText = twoLine(esc(t.title), '— Start');
    else if (t.dueDate && !t.startDate)         chipText = twoLine(esc(t.title), 'End —', true);
    else if (t.startDate && t.dueDate)          chipText = `<span class="ct-title">${contPrev}${esc(t.title)}${contNext}</span>`; // same day — title only
    else                                        chipText = `<span class="ct-title">${contPrev}${esc(t.title)}${contNext}</span>`;
  }
  return `<div class="${chipClass}" style="${chipStyle}" data-tid="${t.id}"
    draggable="true" title="${label}"
    onclick="event.stopPropagation();openTaskModal('${t.id}',null)"
    ondragstart="ev_taskDragStart(event,'${t.id}')"
    ondragend="ev_taskDragEnd(event)">${chipText}</div>`;
}

// Show a popover listing all tasks for a given day (clicked from "+N more")
function showDayPopover(e, iso) {
  e.stopPropagation();
  closeDayPopover();
  const cell = e.currentTarget.closest('.cal-cell');
  if (!cell) return;
  const rect = cell.getBoundingClientRect();
  const monthStart = `${calY}-${String(calM+1).padStart(2,'0')}-01`;
  const last = new Date(calY,calM+1,0).getDate();
  const monthEnd = `${calY}-${String(calM+1).padStart(2,'0')}-${String(last).padStart(2,'0')}`;
  const visIds=new Set(calVisibleGroups().map(g=>g.id));
  const multiGroup=S.groups.length>1;
  const dayTasks = S.tasks.filter(t => {
    if (t.completed || !visIds.has(t.groupId)) return false;
    if (t.startDate&&t.dueDate) return t.startDate<=iso && iso<=t.dueDate;
    if (t.dueDate)   return t.dueDate===iso;
    if (t.startDate) return t.startDate===iso;
    return false;
  });
  const pop = document.createElement('div');
  pop.className = 'cal-day-popover';
  pop.onclick = ev => ev.stopPropagation();
  const dateLabel = formatArchiveDate(iso);
  pop.innerHTML = `<div class="cal-day-popover-title">${esc(dateLabel)} — ${dayTasks.length} task${dayTasks.length!==1?'s':''}</div>` +
    dayTasks.map(t => renderCalChip(t, iso, monthStart, monthEnd, multiGroup, true)).join('');
  document.body.appendChild(pop);
  // Position: prefer below the cell, flip up if off-screen
  const pw = 280;
  let left = Math.min(Math.max(rect.left, 8), window.innerWidth - pw - 8);
  let top = rect.bottom + 4;
  const popH = pop.getBoundingClientRect().height;
  if (top + popH > window.innerHeight - 8) top = Math.max(8, rect.top - popH - 4);
  pop.style.left = left + 'px';
  pop.style.top = top + 'px';
  // Close on outside click / Escape
  setTimeout(() => {
    document.addEventListener('pointerdown', _dayPopoverOutside);
    document.addEventListener('keydown', _dayPopoverEsc);
  }, 10);
}
function closeDayPopover() {
  document.querySelector('.cal-day-popover')?.remove();
  document.removeEventListener('pointerdown', _dayPopoverOutside);
  document.removeEventListener('keydown', _dayPopoverEsc);
}
function _dayPopoverOutside(e) {
  if (!e.target.closest('.cal-day-popover')) closeDayPopover();
}
function _dayPopoverEsc(e) {
  if (e.key === 'Escape') closeDayPopover();
}

function calNav(d) {
  calM+=d;
  if (calM>11){calM=0;calY++;} else if (calM<0){calM=11;calY--;}
  renderCalendar();
}
function calToday() {
  const n = new Date();
  calY = n.getFullYear(); calM = n.getMonth();
  renderCalendar();
}

// ══════════════════════════════════════
//  RENDER ARCHIVE
// ══════════════════════════════════════
function renderArchive() {
  const visGroups = arcVisibleGroups();
  const visIds = new Set(visGroups.map(g=>g.id));
  const done = S.tasks.filter(t=>t.completed&&visIds.has(t.groupId));
  done.sort((a,b)=>(b.completedAt||'').localeCompare(a.completedAt||''));
  const el = document.getElementById('archive-list');
  if (!done.length) { el.innerHTML=`<div class="archive-empty">Nothing archived yet.</div>`; return; }

  const showGroupHeaders = visGroups.length > 1;
  let html = '';
  for (const g of visGroups) {
    const gTasks = done.filter(t=>t.groupId===g.id);
    if (!gTasks.length) continue;
    if (showGroupHeaders) html += `<div class="archive-group-label">${esc(g.name)}</div>`;
    for (const t of gTasks) {
      const p=panelObj(t.panelId), s=subj(t.subjectId,g), ty=ttype(t.typeId,g);
      const dot=s?s.color:(p?.color||'#444');
      html += `<div class="archive-item">
        <div class="archive-dot" style="background:${dot}"></div>
        <div class="archive-title">${esc(t.title)}</div>
        <div class="archive-meta">${p?esc(p.name):'—'}</div>
        ${ty?`<div class="archive-meta" style="color:${ty.color};">${esc(ty.name)}</div>`:''}
        <div class="archive-meta">${t.dueDate?formatArchiveDate(t.dueDate):'—'}</div>
        <button class="sm-btn" onclick="restoreTask('${t.id}')">Restore</button>
        <button class="sm-btn" style="color:#e05555;" onclick="deleteTaskPerm('${t.id}')">Delete</button>
      </div>`;
    }
  }
  el.innerHTML = html || `<div class="archive-empty">Nothing archived yet.</div>`;
}

// ══════════════════════════════════════
//  DRAG & DROP
// ══════════════════════════════════════
function ev_taskDragStart(e,id) {
  dragId=id; e.dataTransfer.effectAllowed='move';
  // Custom drag image — readable label regardless of chip size
  const t=task(id);
  if (t) {
    const img=document.createElement('div');
    img.textContent=t.title;
    img.style.cssText='position:fixed;top:-999px;padding:6px 12px;background:#1c1c28;color:#e4e4ee;border:1px solid #5b8fff;border-radius:6px;font:600 11px IBM Plex Mono,monospace;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.6);';
    document.body.appendChild(img);
    e.dataTransfer.setDragImage(img, 10, 16);
    setTimeout(()=>img.remove(), 0);
  }
  setTimeout(()=>{
    document.getElementById(`tc-${id}`)?.classList.add('dragging');
    document.querySelectorAll(`.cal-task[data-tid="${id}"]`).forEach(el=>el.classList.add('cal-dragging'));
  },0);
}
function ev_taskDragEnd() {
  if (dragId) {
    document.getElementById(`tc-${dragId}`)?.classList.remove('dragging');
    document.querySelectorAll(`.cal-task[data-tid="${dragId}"]`).forEach(el=>el.classList.remove('cal-dragging'));
  }
  dragId=null;
  document.querySelectorAll('.dov,.task-drop-before').forEach(el=>el.classList.remove('dov','task-drop-before'));
}
function ev_panelOver(e,pid)  { e.preventDefault(); document.getElementById(`pbody-${pid}`)?.classList.add('dov'); }
function ev_panelLeave(e,pid) { document.getElementById(`pbody-${pid}`)?.classList.remove('dov'); }
function ev_panelDrop(e,pid) {
  e.preventDefault(); document.getElementById(`pbody-${pid}`)?.classList.remove('dov');
  if (!dragId) return;
  const t=task(dragId); if (!t) return;
  t.panelId=pid; save(); renderBoard(); renderCalendar();
}

// Panel sort cycling: date → alpha → none → date
function cyclePanelSort(pid) {
  const g=activeGroup(); if(!g) return;
  const p=g.panels.find(p=>p.id===pid); if(!p) return;
  const cycle=['date','alpha','none'];
  p.sort=cycle[(cycle.indexOf(p.sort||'date')+1)%cycle.length];
  save(); renderBoard();
}

// ══════════════════════════════════════
//  POINTER DRAG — board tasks & panels
// ══════════════════════════════════════
const pd={active:false,type:null,id:null,ghost:null,placeholder:null,origEl:null,offX:0,offY:0};

function initTaskPointerDrag(e,taskId){
  if(e.button!==0||e.target.closest('button')) return;
  if(pd.active) cleanupPD(); // recover from any stuck state
  const card=document.getElementById(`tc-${taskId}`); if (!card) return;
  e.preventDefault();
  const rect=card.getBoundingClientRect();
  pd.type='task'; pd.id=taskId; pd.origEl=card;
  pd.offX=e.clientX-rect.left; pd.offY=e.clientY-rect.top;
  pd.width=rect.width; pd.height=rect.height;
  pd.ghost=card.cloneNode(true); pd.ghost.removeAttribute('id');
  Object.assign(pd.ghost.style,{position:'fixed',zIndex:'9999',pointerEvents:'none',
    width:rect.width+'px',left:rect.left+'px',top:rect.top+'px',opacity:'0.93',
    transform:'rotate(2deg) scale(1.04)',boxShadow:'0 20px 60px rgba(0,0,0,0.8)',
    borderRadius:'var(--radius)',willChange:'left,top',transition:'transform 0.12s,box-shadow 0.12s'});
  document.body.appendChild(pd.ghost);
  pd.placeholder=document.createElement('div');
  pd.placeholder.className='task-placeholder';
  pd.placeholder.style.cssText=`height:${rect.height}px;`;
  pdFlip(card.parentNode,()=>{card.parentNode.insertBefore(pd.placeholder,card);card.style.display='none';},'.task-card');
  pd.active=true;
  document.addEventListener('pointermove',onPDMove,{passive:false});
  document.addEventListener('pointerup',onPDUp);
  document.addEventListener('pointercancel',()=>cleanupPD(true));
}

function initPanelPointerDrag(e,panelId){
  if(e.button!==0||e.target.closest('button,.panel-name-input')) return;
  if(pd.active) cleanupPD(); // recover from any stuck state
  const panel=document.getElementById(`panel-${panelId}`); if(!panel) return;
  e.preventDefault();
  const rect=panel.getBoundingClientRect();
  pd.type='panel'; pd.id=panelId; pd.origEl=panel;
  pd.offX=e.clientX-rect.left; pd.offY=e.clientY-rect.top;
  pd.width=rect.width; pd.height=rect.height;

  // Ghost: header + task count (same approach as task ghost)
  const headerEl=panel.querySelector('.panel-header');
  const taskCount=S.tasks.filter(t=>t.panelId===panelId&&!t.completed).length;
  pd.ghost=document.createElement('div');
  pd.ghost.style.cssText=`position:fixed;z-index:9999;pointer-events:none;
    width:${rect.width}px;left:${rect.left}px;top:${rect.top}px;
    opacity:0.93;transform:rotate(1deg) scale(1.02);
    box-shadow:0 20px 60px rgba(0,0,0,0.8);border-radius:var(--radius-lg);
    overflow:hidden;background:var(--surface);border:1px solid var(--border2);
    will-change:left,top;transition:transform 0.12s,box-shadow 0.12s;`;
  if(headerEl){const hc=headerEl.cloneNode(true);hc.style.pointerEvents='none';pd.ghost.appendChild(hc);}
  const hint=document.createElement('div');
  hint.style.cssText='padding:8px 14px;font-size:10px;color:var(--text-muted);font-family:"IBM Plex Mono",monospace;opacity:0.7;';
  hint.textContent=`${taskCount} task${taskCount!==1?'s':''}`;
  pd.ghost.appendChild(hint);
  document.body.appendChild(pd.ghost);

  // Placeholder exactly same size as panel — stays in container, other panels FLIP around it
  pd.placeholder=document.createElement('div');
  pd.placeholder.className='panel-placeholder';
  pd.placeholder.style.cssText=`min-width:${rect.width}px;max-width:${rect.width}px;height:${rect.height}px;flex-shrink:0;box-sizing:border-box;`;
  const container=panel.parentNode;
  container.insertBefore(pd.placeholder,panel);
  panel.style.display='none';

  pd.active=true;
  document.addEventListener('pointermove',onPDMove,{passive:false});
  document.addEventListener('pointerup',onPDUp);
  document.addEventListener('pointercancel',()=>cleanupPD(true));
}

// Layout rect: bounding rect minus any in-progress CSS transform offset
function pdLayoutRect(el){
  const r=el.getBoundingClientRect();
  let dx=0,dy=0;
  const t=window.getComputedStyle(el).transform;
  if(t&&t!=='none'){
    try{ const m=new DOMMatrix(t); dx=m.m41; dy=m.m42; }catch(e){}
  }
  return {left:r.left-dx, right:r.right-dx, top:r.top-dy, bottom:r.bottom-dy, width:r.width, height:r.height};
}

function onPDMove(e){
  if(!pd.active||!pd.ghost||!pd.placeholder) return;
  e.preventDefault();
  pd.ghost.style.left=(e.clientX-pd.offX)+'px';
  pd.ghost.style.top=(e.clientY-pd.offY)+'px';

  const probeX = e.clientX - pd.offX + pd.width/2;
  const probeY = e.clientY - pd.offY + pd.height/2;

  if(pd.type==='task'){
    const board=document.getElementById('panel-container');
    const tasksHoriz=board?.classList.contains('board-horizontal');

    pd.ghost.style.display='none';
    const under=document.elementsFromPoint(probeX, probeY) || [];
    pd.ghost.style.display='';

    // Find panel body under probe; panel-body doesn't animate so elementsFromPoint is reliable for it
    const body=under.find(el=>el && el.classList && el.classList.contains('panel-body'));
    if(body){
      // Iterate cards in this body using LAYOUT rects (unaffected by ongoing animations)
      const cards=[...body.querySelectorAll('.task-card')].filter(el=>el!==pd.origEl);
      let card=null, cardRect=null;
      for(const cd of cards){
        const r=pdLayoutRect(cd);
        if(probeX>=r.left && probeX<r.right && probeY>=r.top && probeY<r.bottom){
          card=cd; cardRect=r; break;
        }
      }
      if(card){
        const before = tasksHoriz ? probeX<cardRect.left+cardRect.width/2 : probeY<cardRect.top+cardRect.height/2;
        const target=before?card:card.nextSibling;
        if(pd.placeholder.nextSibling!==target||pd.placeholder.parentNode!==card.parentNode)
          pdFlip(card.parentNode,()=>card.parentNode.insertBefore(pd.placeholder,target||null),'.task-card');
      } else if(!body.contains(pd.placeholder)){
        const hint=body.querySelector('.empty-panel-hint');
        if(hint) hint.style.display='none';
        pdFlip(body,()=>body.appendChild(pd.placeholder),'.task-card');
      }
    }

  } else if(pd.type==='panel'){
    const container=pd.placeholder.parentNode;
    if(!container||!container.classList) return;
    const sideBySide = container.classList.contains('board-vertical');
    const panels=[...container.querySelectorAll('.panel')].filter(el=>el!==pd.origEl);

    const probe = sideBySide ? probeX : probeY;
    for(let i=0;i<panels.length;i++){
      const r=pdLayoutRect(panels[i]);
      const start = sideBySide ? r.left : r.top;
      const end   = sideBySide ? r.right : r.bottom;
      if(probe>=start && probe<end){
        const before=probe<start+(end-start)/2;
        const target=before?panels[i]:panels[i].nextSibling;
        if(pd.placeholder.nextSibling!==target)
          pdFlip(container,()=>container.insertBefore(pd.placeholder,target||null),'.panel');
        break;
      }
    }
  }
}

function onPDUp(){
  if(!pd.active) return;
  try {
    if(pd.type==='task'){
      const body=pd.placeholder?.parentNode;
      if(body){
        const panelId=body.id?.replace('pbody-','');
        const t=task(pd.id);
        if(t&&panelId){
          t.panelId=panelId;
          const g=activeGroup(),p=g?.panels.find(p=>p.id===panelId);
          if(p?.sort==='none'){
            const phIdx=[...body.children].indexOf(pd.placeholder);
            const nextCard=[...body.children].slice(phIdx+1).find(el=>el.classList?.contains('task-card')&&el!==pd.origEl);
            const nt=nextCard?task(nextCard.id.replace('tc-','')):null;
            const fi=S.tasks.indexOf(t);
            if(fi>=0) S.tasks.splice(fi,1);
            if(nt){const ti=S.tasks.indexOf(nt);S.tasks.splice(ti,0,t);}
            else S.tasks.push(t);
          }
          save();
        }
      }
    } else if(pd.type==='panel'){
      const container=pd.placeholder?.parentNode;
      const g=activeGroup();
      if(g && container){
        const order=[...container.children].map(el=>{
          if(el.classList?.contains('panel-placeholder')) return pd.id;
          if(el===pd.origEl) return null;
          return el.id?.replace('panel-','');
        }).filter(Boolean);
        g.panels.sort((a,b)=>order.indexOf(a.id)-order.indexOf(b.id));
        invalidatePanelCache();
        save();
      }
    }
  } catch(err){
    console.error('Drop error:', err);
  } finally {
    cleanupPD();
    renderBoard();
    renderCalendar();
  }
}

function cleanupPD(cancel=false){
  pd.ghost?.remove(); pd.placeholder?.remove();
  if(pd.origEl){
    pd.origEl.style.display=''; pd.origEl.style.visibility='';
    pd.origEl.style.opacity=''; pd.origEl.style.pointerEvents='';
  }
  Object.assign(pd,{active:false,type:null,id:null,ghost:null,placeholder:null,origEl:null});
  document.removeEventListener('pointermove',onPDMove);
  document.removeEventListener('pointerup',onPDUp);
  if(cancel) renderBoard();
}

function pdFlip(container,action,sel,exclude){
  if(!container){action();return;}
  const items=[...container.querySelectorAll(sel)].filter(el=>el!==exclude);
  // Read current visual positions (mid-animation positions are fine — we animate from where we ARE)
  const first=new Map(); items.forEach(el=>first.set(el,el.getBoundingClientRect()));
  action();
  items.forEach(el=>{
    const f=first.get(el); if(!f) return;
    const r=el.getBoundingClientRect();
    const dx=f.left-r.left,dy=f.top-r.top; if(!dx&&!dy) return;
    el.style.transition='none'; el.style.transform=`translate(${dx}px,${dy}px)`;
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      el.style.transition='transform 0.2s cubic-bezier(0.2,0,0,1)';
      el.style.transform='';
      el.addEventListener('transitionend',()=>{el.style.transition='';el.style.transform='';},{once:true});
    }));
  });
}

// Safe UTC-only date helpers — avoids timezone-shift bugs with ISO strings
function daysBetween(isoA, isoB) {
  const p = s => { const [y,m,d]=s.split('-').map(Number); return Date.UTC(y,m-1,d); };
  return Math.round((p(isoB)-p(isoA))/86400000);
}
function addDaysToISO(iso, days) {
  const [y,m,d]=iso.split('-').map(Number);
  return new Date(Date.UTC(y,m-1,d+days)).toISOString().slice(0,10);
}

function ev_calOver(e)  { e.preventDefault(); e.currentTarget.classList.add('dov'); }
function ev_calLeave(e) { e.currentTarget.classList.remove('dov'); }
function ev_calDrop(e,iso) {
  e.preventDefault(); e.currentTarget.classList.remove('dov');
  if (!dragId) return;
  const t=task(dragId); if (!t) return;
  if (t.startDate) {
    if (t.dueDate) {
      const dur=daysBetween(t.startDate, t.dueDate);
      t.startDate=iso;
      t.dueDate=addDaysToISO(iso, dur);
    } else {
      t.startDate=iso;
    }
  } else {
    t.dueDate=iso;
  }
  save(); renderCalendar(); renderBoard();
}

function addPanel() {
  const g=activeGroup(); if (!g) return;
  const newPanel = {id:uid(),name:'New Panel',color:'#111111',sort:'date'};
  g.panels.push(newPanel);
  invalidatePanelCache();
  save(); renderBoard();
  setTimeout(()=>{
    // Auto-scroll the new panel into view (especially important in vertical/Trello mode)
    const newEl = document.getElementById(`panel-${newPanel.id}`);
    const container = document.getElementById('panel-container');
    if (newEl && container) {
      if (container.classList.contains('board-vertical')) {
        container.scrollTo({left: container.scrollWidth, behavior: 'smooth'});
      } else {
        newEl.scrollIntoView({block:'nearest', behavior:'smooth'});
      }
    }
    const inputs=document.querySelectorAll('.panel-name-input');
    if (!inputs.length) return;
    const el=inputs[inputs.length-1];
    el.focus();
    const range=document.createRange();
    range.selectNodeContents(el);
    const sel=window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  },60);
}
function renamePanel(pid,name) {
  const c = panelByIdCached(pid);
  if (!c) return;
  c.panel.name = name;
  save();
}
function renamePanelFromEl(el, pid) {
  let name = (el.textContent||'').trim();
  if (name.length > 80) name = name.slice(0,80);
  const c = panelByIdCached(pid);
  if (!c) return;
  if (!name) {
    // Restore previous name (don't silently rename to "New Panel")
    el.textContent = c.panel.name || 'New Panel';
    showToast('&#x26A0; Panel name can&#39;t be empty.');
    return;
  }
  el.textContent = name; // reflect any trimming back into the DOM
  renamePanel(pid, name);
}
function deletePanel(pid) {
  const g=activeGroup(); if (!g) return;
  const p=g.panels.find(p=>p.id===pid);
  if (!p) return;
  confirmModal(`Delete panel "${p.name}" and all its tasks?`, () => {
    const idx = g.panels.indexOf(p);
    const removedTasks = S.tasks.filter(t => t.panelId === pid);
    _pushUndo({
      kind:'panel',
      groupId:g.id,
      index:idx,
      panel:JSON.parse(JSON.stringify(p)),
      tasks:JSON.parse(JSON.stringify(removedTasks)),
      label:`Panel "${p.name}" deleted`,
    });
    g.panels=g.panels.filter(x=>x.id!==pid);
    S.tasks=S.tasks.filter(t=>t.panelId!==pid);
    invalidatePanelCache();
    save(); renderBoard(); renderCalendar();
  });
}

function saveTask(tid,dpid) {
  const g=activeGroup(); if (!g) return;
  const title=document.getElementById('ti-title').value.trim();
  if (!title){alert('Title is required.');return;}
  const panelId=document.getElementById('ti-panel').value||dpid;
  const startDate=document.getElementById('ti-start').value;
  const dueDate=document.getElementById('ti-date').value;
  if (startDate&&dueDate&&dueDate<startDate){alert('Due date cannot be before the start date.');return;}
  const subjectId=document.getElementById('ti-subj').value;
  const typeId=document.getElementById('ti-type').value;
  if (tid) { const t=task(tid); if(t) Object.assign(t,{title,panelId,startDate,dueDate,subjectId,typeId}); }
  else S.tasks.push({id:uid(),groupId:g.id,panelId,title,startDate,dueDate,subjectId,typeId,completed:false,completedAt:null});
  save(); closeModals(); renderBoard(); renderCalendar();

// Shared row template — `kind` is 's' (subject) or 't' (type).
// Used by both initial render (via sRow/tRow inside openSettings) and the
// `addSubjRow`/`addTypeRow` event handlers below. Eliminates 4 near-duplicate templates.
function makeSettingsRow(kind, id, name, color) {
  const placeholder = kind === 's' ? 'Subject name' : 'Type name';

  return `<tr id="${kind}row-${id}">

    <td><div class="stbl-color-btn" id="${kind}cb-${id}" style="background:${color}" onclick="openInlineColor('${kind}c-${id}','${kind}cb-${id}')" aria-label="Pick colour"></div><input type="hidden" id="${kind}c-${id}" value="${color}"></td>
    <td><button class="stbl-del" onclick="document.getElementById('${kind}row-${id}').remove()" aria-label="${removeLabel}">&#x2715;</button></td>

function handleBgFile(input) {
  const file=input.files[0]; if (!file) return;
  if (!file.type.startsWith('image/')) {
    showToast('&#x2715; Not an image file.');
    input.value=''; return;
  }
  // If file is small enough, use as-is. Otherwise downsample via canvas.
  if (file.size <= MAX_BG_IMAGE_BYTES) {
    _readBgAsDataURL(file);
  } else {
    showToast('Compressing large image…');
    _compressBgFile(file);
  }
}
function _readBgAsDataURL(file) {
  const reader=new FileReader();
  reader.onload=e=>{ _pendingBgData=e.target.result; previewBg(); };
  reader.onerror=()=>showToast('&#x2715; Could not read image.');
  reader.readAsDataURL(file);
}
function _compressBgFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      // Downsize to max 1920px on the long edge, JPEG 0.82
      const MAX = 1920;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w >= h) { h = Math.round(h * MAX/w); w = MAX; }
        else        { w = Math.round(w * MAX/h); h = MAX; }
      }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      let data = c.toDataURL('image/jpeg', 0.82);
      // Re-compress harder if still too big
      if (data.length > MAX_BG_DATA_URL_LEN) {
        data = c.toDataURL('image/jpeg', 0.6);
      }
      if (data.length > MAX_BG_DATA_URL_LEN) {
        showToast('&#x2715; Image too large even after compression.');
        return;
      }
      _pendingBgData = data;
      previewBg();
      showToast('&#10003; Image ready.');
    };
    img.onerror = () => showToast('&#x2715; Could not decode image.');
    img.src = e.target.result;
  };
  reader.onerror = () => showToast('&#x2715; Could not read image.');
  reader.readAsDataURL(file);
}
function clearBgImage() {
  const g=activeGroup(); if(!g) return;
  _pendingBgData=''; g.settings.bgImage=''; save(); applyBg(); closeModals(); openSettings();
}
function previewBg() {
  const g=activeGroup();
  const src=_pendingBgData!=null?_pendingBgData:(g?.settings.bgImage||'');
  const blur=document.getElementById('bg-blur')?.value||0;
  const bl=document.getElementById('bg-layer');
  if(src){bl.style.backgroundImage=`url(${src})`;bl.style.filter=`blur(${blur}px)`;bl.style.transform='scale(1.06)';}
  else{bl.style.backgroundImage='';bl.style.filter='';bl.style.transform='';}
}
function saveSettings() {
  const g=activeGroup(); if(!g) return;
  g.subjects=[];
  document.querySelectorAll('#subj-tbody tr').forEach(row=>{
    const id=row.id.replace('srow-','');
    const name=row.querySelector(`#sn-${id}`)?.value?.trim();
    const color=row.querySelector(`#sc-${id}`)?.value||'#a8d8ea';
    if(name) g.subjects.push({id,name,color});
  });
  g.taskTypes=[];
  document.querySelectorAll('#type-tbody tr').forEach(row=>{
    const id=row.id.replace('trow-','');
    const name=row.querySelector(`#tn-${id}`)?.value?.trim();
    const color=row.querySelector(`#tc-${id}`)?.value||'#b5ead7';
    if(name) g.taskTypes.push({id,name,color});
  });
  const layActive=document.querySelector('#layout-opts .opt-btn.active');
  const csActive =document.querySelector('#cs-opts .opt-btn.active');
  if(layActive && layActive.dataset.value) g.settings.panelLayout = layActive.dataset.value;
  if(csActive  && csActive.dataset.value)  g.settings.panelColorStyle = csActive.dataset.value;
  if(_pendingBgData!==null) g.settings.bgImage=_pendingBgData;
  g.settings.bgBlur=parseInt(document.getElementById('bg-blur')?.value)||0;
  const bgColorVal=document.getElementById('bg-color')?.value||'';
  g.settings.bgColor=(bgColorVal==='#0c0c0f'?'':bgColorVal);
  _pendingBgData=null;
  save(); closeModals(); renderBoard(); renderCalendar(); applyBg();
}

function switchView(view, btn) {
  document.querySelectorAll('.view-tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.view-content').forEach(c=>c.classList.remove('active'));
  const activeBtn = btn || document.querySelector(`.view-tab-btn[data-view="${view}"]`);
